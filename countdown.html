<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - OXYFIGHT T-Shirt</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background-image: url('Comming Soon.png'); /* ใช้รูปพื้นหลังเดิมของคุณ */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            background-color: #111;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.85); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .countdown-container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(230, 32, 32, 0.2);
            text-align: center;
            box-sizing: border-box;
        }
        .logo img {
            max-width: 180px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }
        p.subtitle {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        /* สไตล์สำหรับกล่องนับเวลา */
        .timer-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .time-box {
            background: rgba(230, 32, 32, 0.15);
            border: 1px solid #E62020;
            border-radius: 10px;
            width: 80px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .time-number {
            font-size: 36px;
            font-weight: 800;
            color: #FF4D4D;
            line-height: 1;
            margin-bottom: 5px;
        }
        .time-label {
            font-size: 14px;
            color: #ddd;
            font-weight: 300;
        }

        /* ปุ่มเข้าสู่หน้าพรีออเดอร์ (จะซ่อนไว้จนกว่าจะถึงเวลา) */
        .enter-btn {
            display: none;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            padding: 15px;
            background-color: #E62020;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
        }
        .enter-btn:hover {
            background-color: #B31515;
            transform: scale(1.05);
        }

        .developer-credit {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
            letter-spacing: 1px;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 480px) {
            .time-box {
                width: 65px;
                padding: 10px 5px;
            }
            .time-number {
                font-size: 28px;
            }
            .time-label {
                font-size: 12px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="countdown-container">
            <div class="logo">
                <img src="Oxyfight 1-1.png" alt="Oxyfight Logo" onerror="this.style.display='none'">
            </div>
            <h1>เตรียมพบกับ OXYFIGHT</h1>
            <p class="subtitle" id="statusText">เปิดพรีออเดอร์ วันที่ 1 มิถุนายน 2569 เวลา 10.00 น.</p>

            <div class="timer-wrapper" id="timerWrapper">
                <div class="time-box">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">วัน</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">ชั่วโมง</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">นาที</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">วินาที</span>
                </div>
            </div>

            <a href="index.html" class="enter-btn" id="enterBtn">เข้าสู่หน้าสั่งจองสินค้า</a>

            <div class="developer-credit">
                พัฒนาโดย REDADX.X·© 2026
            </div>
        </div>
    </div>

    <script>
        // กำหนดวันและเวลาเปิดพรีออเดอร์: 1 มิถุนายน 2026 เวลา 10:00:00
        const countDownDate = new Date("June 1, 2026 10:00:00").getTime();

        const timerInterval = setInterval(function() {
            // ดึงเวลาปัจจุบัน
            const now = new Date().getTime();
            
            // หาความต่างของเวลา
            const distance = countDownDate - now;
            
            // คำนวณ วัน ชั่วโมง นาที วินาที
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // แสดงผล (ใส่ 0 นำหน้าถ้าตัวเลขหลักเดียว)
            document.getElementById("days").innerHTML = days < 10 ? "0" + Math.max(0, days) : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + Math.max(0, hours) : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + Math.max(0, minutes) : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + Math.max(0, seconds) : seconds;
            
            // เมื่อหมดเวลา (ถึงกำหนด)
            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("timerWrapper").style.display = "none";
                document.getElementById("statusText").innerHTML = "เปิดให้สั่งจองล่วงหน้าแล้วตอนนี้!";
                document.getElementById("statusText").style.color = "#E62020";
                document.getElementById("statusText").style.fontWeight = "600";
                
                // แสดงปุ่มเข้าสู่หน้าพรีออเดอร์
                document.getElementById("enterBtn").style.display = "block";
            }
        }, 1000);
    </script>
</body>
</html>

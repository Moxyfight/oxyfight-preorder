<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-order OXYFIGHT T-Shirt</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background-image: url('Comming Soon.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.8); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header img {
            max-width: 150px;
            margin-bottom: 10px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #E62020;
            color: #E62020;
        }
        label {
            font-size: 14px;
            margin-top: 12px;
            display: block;
            color: #ddd;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            background: #222;
            color: white;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #E62020;
            outline: none;
        }
        
        /* สไตล์กล่องระบุไซส์เสื้อ */
        .size-selection-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }
        .size-row {
            margin-bottom: 12px;
        }
        .size-row:last-child {
            margin-bottom: 0;
        }
        .size-row span {
            font-size: 13px;
            color: #E62020;
            font-weight: 600;
        }

        /* ส่วนเลือกช่องทางการชำระเงิน */
        .payment-methods {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .method-btn {
            flex: 1;
            background: #111;
            border: 1px solid #444;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: #aaa;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .method-btn.active {
            border-color: #E62020;
            background: rgba(230, 32, 32, 0.1);
            color: #fff;
        }

        /* กล่องแสดงรายละเอียดข้อมูลธนาคาร / QR */
        .payment-details-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }
        .bank-info-display {
            display: none;
        }
        .bank-info-display.active {
            display: block;
        }
        
        /* สไตล์ไอคอนธนาคารกสิกรไทย */
        .kbank-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: #00A950;
            color: white;
            font-weight: bold;
            font-size: 14px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        
        .account-number {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            margin: 5px 0;
            letter-spacing: 1px;
        }
        .account-owner {
            font-size: 14px;
            color: #aaa;
        }

        /* โซนแสดงราคาสรุป */
        .price-summary-box {
            background: rgba(230, 32, 32, 0.15);
            border: 1px solid #E62020;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        .price-amount {
            color: #FF4D4D;
            font-size: 24px;
            margin: 0 5px;
        }

        .qr-code-img {
            max-width: 200px;
            margin-top: 10px;
            border: 5px solid white;
            border-radius: 4px;
        }

        button.submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #E62020;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
            text-transform: uppercase;
        }
        button.submit-btn:hover {
            background-color: #B31515;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">
            <img src="Oxyfight 1-1.png" alt="Oxyfight Logo">
            <h1>Pre-order</h1>
        </div>

        <div class="form-container">
            <form id="preorderForm">
                
                <div class="section-title">1. ข้อมูลผู้สั่งซื้อ</div>
                
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="nameInput" name="name" required placeholder="กรอกชื่อ-นามสกุล">

                <label>เบอร์โทรศัพท์</label>
                <input type="tel" id="phoneInput" name="phone" required placeholder="08X-XXX-XXXX">

                <label>จำนวนเสื้อที่ต้องการสั่ง (ตัว)</label>
                <input type="number" name="quantity" id="quantityInput" min="1" value="1" required>

                <label>เลือกไซส์เสื้อแต่ละตัว</label>
                <div class="size-selection-box" id="sizeContainer">
                    </div>

                <label>ที่อยู่สำหรับจัดส่ง</label>
                <textarea id="addressInput" name="address" rows="3" required placeholder="บ้านเลขที่, ซอย, ถนน, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>

                <div class="price-summary-box">
                    ยอดเงินรวมที่ต้องชำระ: <span class="price-amount" id="totalPriceDisplay">0</span> บาท
                </div>

                <div class="section-title">2. ดำเนินการโอนเงิน</div>
                
                <div class="payment-methods">
                    <div class="method-btn active" id="btnPromptpay" onclick="selectPayment('promptpay')">
                        พร้อมเพย์ (QR Code)
                    </div>
                    <div class="method-btn" id="btnBank" onclick="selectPayment('bank')">
                        <span class="kbank-icon">K</span> บัญชีธนาคาร
                    </div>
                </div>

                <div class="payment-details-box">
                    <div id="promptpayDisplay" class="bank-info-display active">
                        <div style="font-weight:600; color:#4D94FF; margin-bottom:5px;">สแกนเพื่อจ่ายผ่านแอปธนาคาร</div>
                        <div id="qrContainer">
                            <p style="font-size:13px; color:#aaa;">(ระบบกำลังสร้าง QR อัตโนมัติ)</p>
                        </div>
                    </div>

                    <div id="bankDisplay" class="bank-info-display">
                        <div>
                            <span class="kbank-icon">K</span>
                            <span style="font-size:16px; font-weight:600; color:#00A950;">ธนาคารกสิกรไทย</span>
                        </div>
                        <div class="account-number">1598415214</div>
                        <div class="account-owner">ชื่อบัญชี: หจก.โกลเด้นเจ็ท</div>
                    </div>
                </div>

                <label style="margin-top:20px;">แนบสลิปการโอนเงิน (จำกัดเฉพาะไฟล์รูปภาพ)</label>
                <input type="file" id="slipInput" accept="image/*" required>

                <button type="submit" class="submit-btn" id="submitBtn">ดำเนินการสั่งจองสินค้า</button>
            </form>
        </div>
    </div>

    <script>
        // --- ⚙️ ตั้งค่าข้อมูลการเงินของคุณตรงนี้ ⚙️ ---
        const PRICE_PER_SHIRT = 320; // ราคาเสื้อต่อตัว (บาท)
        const PROMPTPAY_NUMBER = '1129701331742'; // หมายเลขพร้อมเพย์ของคุณ
        // --------------------------------------------------------

        const form = document.getElementById('preorderForm');
        const quantityInput = document.getElementById('quantityInput');
        const sizeContainer = document.getElementById('sizeContainer');
        const totalPriceDisplay = document.getElementById('totalPriceDisplay');
        const qrContainer = document.getElementById('qrContainer');
        
        let currentMethod = 'promptpay';
        let currentTotal = 0;

        // ฟังก์ชันสร้างช่องระบุไซส์แยกตามจำนวนตัวแบบไดนามิก
        function renderSizeFields() {
            const qty = parseInt(quantityInput.value) || 1;
            sizeContainer.innerHTML = ''; // ล้างอินพุตชุดเก่าออกก่อน

            for (let i = 1; i <= qty; i++) {
                const sizeRow = document.createElement('div');
                sizeRow.className = 'size-row';
                sizeRow.innerHTML = `
                    <div style="margin-top: 8px;">
                        <span>เสื้อตัวที่ ${i}:</span>
                        <select class="shirt-size-select" required style="margin-top: 3px;">
                            <option value="">-- เลือกไซส์สำหรับตัวที่ ${i} --</option>
                            <option value="S">S (รอบอก 38")</option>
                            <option value="M">M (รอบอก 40")</option>
                            <option value="L">L (รอบอก 42")</option>
                            <option value="XL">XL (รอบอก 44")</option>
                            <option value="2XL">2XL (รอบอก 46")</option>
                        </select>
                    </div>
                `;
                sizeContainer.appendChild(sizeRow);
            }
            calculateTotal();
        }

        // ฟังก์ชันคำนวณราคาสั่งซื้อรวมตามจำนวนตัว
        function calculateTotal() {
            const qty = parseInt(quantityInput.value) || 0;
            currentTotal = qty * PRICE_PER_SHIRT;
            totalPriceDisplay.textContent = currentTotal.toLocaleString();
            generatePromptPayQR();
        }

        // ฟังก์ชันสร้าง QR Code พร้อมเพย์อัตโนมัติตามราคาที่คำนวณได้
        function generatePromptPayQR() {
            if (currentTotal <= 0) {
                qrContainer.innerHTML = '<p style="font-size:13px; color:#aaa;">(กรุณาระบุจำนวนเพื่อสร้าง QR)</p>';
                return;
            }
            const qrUrl = `https://promptpay.io/${PROMPTPAY_NUMBER}/${currentTotal}.png`;
            qrContainer.innerHTML = `<img src="${qrUrl}" class="qr-code-img" alt="Promptpay QR Code"><br><span style="font-size:12px; color:#aaa; display:block; margin-top:5px;">ยอดโอนอัตโนมัติ: ${currentTotal} บาท</span>`;
        }

        // ฟังก์ชันสลับแท็บช่องทางชำระเงิน
        function selectPayment(method) {
            currentMethod = method;
            document.getElementById('btnPromptpay').classList.remove('active');
            document.getElementById('btnBank').classList.remove('active');
            document.getElementById('promptpayDisplay').classList.remove('active');
            document.getElementById('bankDisplay').classList.remove('active');

            if (method === 'promptpay') {
                document.getElementById('btnPromptpay').classList.add('active');
                document.getElementById('promptpayDisplay').classList.add('active');
            } else {
                document.getElementById('btnBank').classList.add('active');
                document.getElementById('bankDisplay').classList.add('active');
            }
        }

        // สร้างช่องเลือกไซส์เริ่มต้นทันทีเมื่อโหลดหน้าเพจเสร็จ (เริ่มต้นที่ 1 ตัว)
        window.addEventListener('DOMContentLoaded', renderSizeFields);
        quantityInput.addEventListener('input', renderSizeFields);

        // ระบบส่งฟอร์มข้อมูลไปยัง Google Sheets Web App
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwtRgEJ3v-S_bv9vdDltDUDxLpmNUh_LTnov-aH_Z3rAnjVamHTE5LbnqCrvWN5BGDs/exec'; 
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('slipInput');
            
            // รวบรวมไซส์เสื้อจากทุกช่องย่อยมารวมกันเป็นข้อความเดียวส่งเข้าคอลัมน์ของชีต
            const sizeSelects = document.querySelectorAll('.shirt-size-select');
            let sizeSummary = [];
            sizeSelects.forEach((select, index) => {
                if(select.value) {
                    sizeSummary.push(`ตัวที่ ${index+1}: ไซส์ ${select.value}`);
                }
            });
            const finalSizeString = sizeSummary.join(', ');

            btn.textContent = 'กำลังส่งข้อมูลและอัปโหลดสลิป...';
            btn.disabled = true;
            btn.style.backgroundColor = '#666';
            
            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    
                    // 🛠️ แก้ไข

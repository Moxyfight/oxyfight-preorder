<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-order OXYFIGHT T-Shirt</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background-image: url('Comming Soon.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.8); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header img {
            max-width: 150px;
            margin-bottom: 10px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #E62020;
            color: #E62020;
        }
        label {
            font-size: 14px;
            margin-top: 12px;
            display: block;
            color: #ddd;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            background: #222;
            color: white;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #E62020;
            outline: none;
        }
        
        /* สไตล์กล่องระบุไซส์เสื้อ */
        .size-selection-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }
        .size-row {
            margin-bottom: 12px;
        }
        .size-row:last-child {
            margin-bottom: 0;
        }
        .size-row span {
            font-size: 13px;
            color: #E62020;
            font-weight: 600;
        }

        /* ส่วนเลือกช่องทางการชำระเงิน */
        .payment-methods {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .method-btn {
            flex: 1;
            background: #111;
            border: 1px solid #444;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: #aaa;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .method-btn.active {
            border-color: #E62020;
            background: rgba(230, 32, 32, 0.1);
            color: #fff;
        }

        /* กล่องแสดงรายละเอียดข้อมูลธนาคาร / QR */
        .payment-details-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }
        .bank-info-display {
            display: none;
        }
        .bank-info-display.active {
            display: block;
        }

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-order OXYFIGHT T-Shirt</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background-image: url('Comming Soon.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.8); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header img {
            max-width: 150px;
            margin-bottom: 10px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ⏳ สไตล์หน้าจอนับถอยหลัง (Countdown) */
        #countdown-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            box-sizing: border-box;
            text-align: center;
            margin-top: 20px;
        }
        .countdown-title {
            font-size: 20px;
            font-weight: 600;
            color: #E62020;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .timer-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .timer-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            min-width: 70px;
        }
        .timer-number {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            display: block;
            line-height: 1;
        }
        .timer-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
            display: block;
        }

        /* 📋 สไตล์ฟอร์มสั่งซื้อ (จะถูกซ่อนไว้เริ่มต้น) */
        .form-container {
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะถึงเวลา */
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #E62020;
            color: #E62020;
        }
        label {
            font-size: 14px;
            margin-top: 12px;
            display: block;
            color: #ddd;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            background: #222;
            color: white;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #E62020;
            outline: none;
        }
        
        .size-selection-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }
        .size-row {
            margin-bottom: 12px;
        }
        .size-row:last-child {
            margin-bottom: 0;
        }
        .size-row span {
            font-size: 13px;
            color: #E62020;
            font-weight: 600;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .method-btn {
            flex: 1;
            background: #111;
            border: 1px solid #444;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: #aaa;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .method-btn.active {
            border-color: #E62020;
            background: rgba(230, 32, 32, 0.1);
            color: #fff;
        }

        .payment-details-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }
        .bank-info-display {
            display: none;
        }
        .bank-info-display.active {
            display: block;
        }
        
        .kbank-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: #00A950;
            color: white;
            font-weight: bold;
            font-size: 14px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        
        .account-number {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            margin: 5px 0;
            letter-spacing: 1px;
        }
        .account-owner {
            font-size: 14px;
            color: #aaa;
        }

        .price-summary-box {
            background: rgba(230, 32, 32, 0.15);
            border: 1px solid #E62020;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        .price-amount {
            color: #FF4D4D;
            font-size: 24px;
            margin: 0 5px;
        }

        .qr-code-img {
            max-width: 200px;
            margin-top: 10px;
            border: 5px solid white;
            border-radius: 4px;
        }

        button.submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #E62020;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
            text-transform: uppercase;
        }
        button.submit-btn:hover {
            background-color: #B31515;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">
            <img src="Oxyfight 1-1.png" alt="Oxyfight Logo">
            <h1>Pre-order</h1>
        </div>

        <div id="countdown-container">
            <div class="countdown-title">🚀 ระบบเปิดสั่งจองล่วงหน้าในอีก</div>
            <div class="timer-grid">
                <div class="timer-box"><span class="timer-number" id="days">00</span><span class="timer-label">วัน</span></div>
                <div class="timer-box"><span class="timer-number" id="hours">00</span><span class="timer-label">ชม.</span></div>
                <div class="timer-box"><span class="timer-number" id="minutes">00</span><span class="timer-label">นาที</span></div>
                <div class="timer-box"><span class="timer-number" id="seconds">00</span><span class="timer-label">วิ</span></div>
            </div>
        </div>

        <div class="form-container" id="mainFormContainer">
            <form id="preorderForm">
                <div class="section-title">1. ข้อมูลผู้สั่งซื้อ</div>
                
                <label>ชื่อ-นามสกุล</label>
                <input type="text" name="name" required placeholder="กรอกชื่อ-นามสกุล">

                <label>เบอร์โทรศัพท์</label>
                <input type="tel" name="phone" required placeholder="08X-XXX-XXXX">

                <label>จำนวนเสื้อที่ต้องการสั่ง (ตัว)</label>
                <input type="number" name="quantity" id="quantityInput" min="1" value="1" required>

                <label>เลือกไซส์เสื้อแต่ละตัว</label>
                <div class="size-selection-box" id="sizeContainer"></div>

                <label>ที่อยู่สำหรับจัดส่ง</label>
                <textarea name="address" rows="3" required placeholder="บ้านเลขที่, ซอย, ถนน, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>

                <div class="price-summary-box">
                    ยอดเงินรวมที่ต้องชำระ: <span class="price-amount" id="totalPriceDisplay">0</span> บาท
                </div>

                <div class="section-title">2. ดำเนินการโอนเงิน</div>
                
                <div class="payment-methods">
                    <div class="method-btn active" id="btnPromptpay" onclick="selectPayment('promptpay')">
                        พร้อมเพย์ (QR Code)
                    </div>
                    <div class="method-btn" id="btnBank" onclick="selectPayment('bank')">
                        <span class="kbank-icon">K</span> บัญชีธนาคาร
                    </div>
                </div>

                <div class="payment-details-box">
                    <div id="promptpayDisplay" class="bank-info-display active">
                        <div style="font-weight:600; color:#4D94FF; margin-bottom:5px;">สแกนเพื่อจ่ายผ่านแอปธนาคาร</div>
                        <div id="qrContainer">
                            <p style="font-size:13px; color:#aaa;">(ระบบกำลังสร้าง QR อัตโนมัติ)</p>
                        </div>
                    </div>

                    <div id="bankDisplay" class="bank-info-display">
                        <div>
                            <span class="kbank-icon">K</span>
                            <span style="font-size:16px; font-weight:600; color:#00A950;">ธนาคารกสิกรไทย</span>
                        </div>
                        <div class="account-number">1598415214</div>
                        <div class="account-owner">ชื่อบัญชี: หจก.โกลเด้นเจ็ท</div>
                    </div>
                </div>

                <label style="margin-top:20px;">แนบสลิปการโอนเงิน (จำกัดเฉพาะไฟล์รูปภาพ)</label>
                <input type="file" id="slipInput" accept="image/*" required>

                <button type="submit" class="submit-btn" id="submitBtn">ดำเนินการสั่งจองสินค้า</button>
            </form>
        </div>
    </div>

    <script>
        // --- ⚙️ [จุดที่ 1] ตั้งค่าเวลานับถอยหลังเพื่อเปิดระบบที่นี่ ⚙️ ---
        // รูปแบบระบุเวลา: 'Month Day, Year Hour:Minute:Second'
        const TARGET_LAUNCH_DATE = 'June 1, 2026 09:00:00'; 

        // --- ⚙️ [จุดที่ 2] ตั้งค่าข้อมูลการเงินของคุณตรงนี้ ⚙️ ---
        const PRICE_PER_SHIRT = 320; 
        const PROMPTPAY_NUMBER = '1129701331742'; 
        // --------------------------------------------------------

        const form = document.getElementById('preorderForm');
        const quantityInput = document.getElementById('quantityInput');
        const sizeContainer = document.getElementById('sizeContainer');
        const totalPriceDisplay = document.getElementById('totalPriceDisplay');
        const qrContainer = document.getElementById('qrContainer');
        
        let currentMethod = 'promptpay';
        let currentTotal = 0;

        // ⏳ ฟังก์ชันนับถอยหลังเปิดระบบอัตโนมัติ
        function startCountdown() {
            const launchTime = new Date(TARGET_LAUNCH_DATE).getTime();

            const timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = launchTime - now;

                // หากถึงเวลาหรือเลยเวลาเปิดจองแล้ว ให้ปิดกล่องนับถอยหลังแล้วเปิดฟอร์มทันที
                if (distance <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('countdown-container').style.display = 'none';
                    document.getElementById('mainFormContainer').style.display = 'block';
                    renderSizeFields(); // เริ่มโหลดฟังก์ชันฟอร์ม
                    return;
                }

                // คำนวณวัน เวลา นาที วินาที
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // แสดงผลตัวเลขลงหน้าจอเว็บ
                document.getElementById('days').textContent = days.toString().padStart(2, '0');
                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }, 1000);
        }

        // ฟังก์ชันสร้างช่องระบุไซส์คละแบบ
        function renderSizeFields() {
            const qty = parseInt(quantityInput.value) || 1;
            sizeContainer.innerHTML = '';

            for (let i = 1; i <= qty; i++) {
                const sizeRow = document.createElement('div');
                sizeRow.className = 'size-row';
                sizeRow.innerHTML = `
                    <div style="margin-top: 8px;">
                        <span>เสื้อตัวที่ ${i}:</span>
                        <select class="shirt-size-select" required style="margin-top: 3px;">
                            <option value="">-- เลือกไซส์สำหรับตัวที่ ${i} --</option>
                            <option value="S">S (รอบอก 38")</option>
                            <option value="M">M (รอบอก 40")</option>
                            <option value="L">L (รอบอก 42")</option>
                            <option value="XL">XL (รอบอก 44")</option>
                            <option value="2XL">2XL (รอบอก 46")</option>
                        </select>
                    </div>
                `;
                sizeContainer.appendChild(sizeRow);
            }
            calculateTotal();
        }

        function calculateTotal() {
            const qty = parseInt(quantityInput.value) || 0;
            currentTotal = qty * PRICE_PER_SHIRT;
            totalPriceDisplay.textContent = currentTotal.toLocaleString();
            generatePromptPayQR();
        }

        function generatePromptPayQR() {
            if (currentTotal <= 0) {
                qrContainer.innerHTML = '<p style="font-size:13px; color:#aaa;">(กรุณาระบุจำนวนเพื่อสร้าง QR)</p>';
                return;
            }
            const qrUrl = `https://promptpay.io/${PROMPTPAY_NUMBER}/${currentTotal}.png`;
            qrContainer.innerHTML = `<img src="${qrUrl}" class="qr-code-img" alt="Promptpay QR Code"><br><span style="font-size:12px; color:#aaa; display:block; margin-top:5px;">ยอดโอนอัตโนมัติ: ${currentTotal} บาท</span>`;
        }

        function selectPayment(method) {
            currentMethod = method;
            document.getElementById('btnPromptpay').classList.remove('active');
            document.getElementById('btnBank').classList.remove('active');
            document.getElementById('promptpayDisplay').classList.remove('active');
            document.getElementById('bankDisplay').classList.remove('active');

            if (method === 'promptpay') {
                document.getElementById('btnPromptpay').classList.add('active');
                document.getElementById('promptpayDisplay').classList.add('active');
            } else {
                document.getElementById('btnBank').classList.add('active');
                document.getElementById('bankDisplay').classList.add('active');
            }
        }

        // เริ่มต้นการทำงานระบบนับถอยหลังเมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', startCountdown);
        quantityInput.addEventListener('input', renderSizeFields);

        // ระบบส่งฟอร์มข้อมูลไปยัง Google Sheets Web App
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwtRgEJ3v-S_bv9vdDltDUDxLpmNUh_LTnov-aH_Z3rAnjVamHTE5LbnqCrvWN5BGDs/exec'; 
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('slipInput');
            
            const sizeSelects = document.querySelectorAll('.shirt-size-select');
            let sizeSummary = [];
            sizeSelects.forEach((select, index) => {
                if(select.value) {
                    sizeSummary.push(`ตัวที่ ${index+1}: ไซส์ ${select.value}`);
                }
            });
            const finalSizeString = sizeSummary.join(', ');

            btn.textContent = 'กำลังส่งข้อมูลและอัปโหลดสลิป...';
            btn.disabled = true;
            btn.style.backgroundColor = '#666';
            
            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    
                    const params = new URLSearchParams();
                    params.append('name', form.name.value);
                    params.append('phone', form.phone.value);
                    params.append('size', finalSizeString); 
                    params.append('quantity', quantityInput.value);
                    params.append('address', form.address.value);
                    params.append('slipFile', base64String);
                    params.append('slipFileName', file.name);
                    params.append('slipMimeType', file.type);

                    fetch(scriptURL, { 
                        method: 'POST', 
                        body: params 
                    })
                    .then(response => response.text())
                    .then(result => {
                        alert('สั่งจองและแจ้งโอนเงินสำเร็จเรียบร้อยครับ! ขอบคุณครับ');
                        form.reset();
                        window.location.reload();
                    })
                    .catch(error => {
                        console.error('Error!', error);
                        alert('เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง');
                        btn.textContent = 'ดำเนินการสั่งจองสินค้า';
                        btn.disabled = false;
                        btn.style.backgroundColor = '#E62020';
                    });
                };
                reader.readAsDataURL(file);
            } else {
                alert('กรุณาแนบสลิปการโอนเงินด้วยครับ');
                btn.textContent = 'ดำเนินการสั่งจองสินค้า';
                btn.disabled = false;
                btn.style.backgroundColor = '#E62020';
            }
        });
    </script>
</body>
</html>
